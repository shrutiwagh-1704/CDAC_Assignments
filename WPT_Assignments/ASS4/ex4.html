<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function fetchData(url) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    let isError = false; // change to true to test error

                    if (isError) {
                        reject("Error: URL not reachable");
                    } else {
                        resolve("Response received from " + url);
                    }
                }, 2000);
            });
        }

        async function getData() {
            try {
                const res = await fetchData("my api");
                console.log(res);
            } catch (error) {
                console.log(error);
            }
        }

        getData();
    </script>
</body>

</html>
